<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Snake - WASD</title>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 2rem; text-align: center; }
        canvas { background:#111; display:block; margin:1rem auto; border: 4px solid #222; }
        p { margin: .2rem 0; }
        button { padding:.4rem .8rem; }
    </style>
</head>
<body>
    <h1>Snake (WASD)</h1>
    <p>Usa W A S D para mover. R para reiniciar.</p>
    <canvas id="game" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        if (!canvas) throw new Error('Canvas element with id "game" not found.');
        const ctx = canvas.getContext && canvas.getContext('2d');
        if (!ctx) throw new Error('2D rendering context not available.');

        const CELL = 20;
        const COLS = Math.floor(canvas.width / CELL);
        const ROWS = Math.floor(canvas.height / CELL);
        let snake, dir, nextDir, apple, running, loopId;

        function startGame() {
            snake = [{x: Math.floor(COLS/2), y: Math.floor(ROWS/2)}];
            // initial length 4
            for (let i = 1; i < 4; i++) snake.push({x: snake[0].x - i, y: snake[0].y});
            dir = {x: 1, y: 0};
            nextDir = { ...dir };
            spawnApple();
            running = true;
            clearInterval(loopId);
            loopId = setInterval(gameTick, 100);
            draw();
        }

        function spawnApple() {
            while (true) {
                const a = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
                if (!snake.some(s => s.x === a.x && s.y === a.y)) { apple = a; break; }
            }
        }

        function gameTick() {
            // apply buffered direction (prevent exact reverse)
            if ((nextDir.x !== -dir.x) || (nextDir.y !== -dir.y)) dir = nextDir;
            const newHead = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // wall collision
            if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
                endGame();
                return;
            }
            // self collision
            if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
                endGame();
                return;
            }

            snake.unshift(newHead);
            if (newHead.x === apple.x && newHead.y === apple.y) {
                spawnApple();
            } else {
                snake.pop();
            }
            draw();
        }

        function endGame() {
            running = false;
            clearInterval(loopId);
            // overlay message
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '20px system-ui, Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Juego terminado. Presiona R para reiniciar', canvas.width/2, canvas.height/2);
        }

        function draw() {
            // background
            ctx.fillStyle = '#081017';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // grid (subtle)
            ctx.strokeStyle = '#0b1a22';
            ctx.lineWidth = 1;
            for (let i=0;i<=COLS;i++){
                ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
            }
            for (let j=0;j<=ROWS;j++){
                ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width,j*CELL); ctx.stroke();
            }

            // apple
            if (apple) {
                ctx.fillStyle = '#e53935';
                ctx.fillRect(apple.x*CELL+2, apple.y*CELL+2, CELL-4, CELL-4);
            }

            // snake
            if (snake && snake.length) {
                // smoother, more polished snake: rounded segments, connectors, head gradient and eyes
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const cx = seg.x * CELL + CELL / 2;
                    const cy = seg.y * CELL + CELL / 2;
                    const r = CELL * 0.45;

                    // choose fill for segment (head gets gradient)
                    let fillStyle;
                    if (i === 0) {
                        const g = ctx.createLinearGradient(
                            cx - dir.x * CELL / 2, cy - dir.y * CELL / 2,
                            cx + dir.x * CELL / 2, cy + dir.y * CELL / 2
                        );
                        g.addColorStop(0, '#e8f5e9');
                        g.addColorStop(1, '#66bb6a');
                        fillStyle = g;
                        ctx.shadowColor = 'rgba(0,0,0,0.45)';
                        ctx.shadowBlur = 6;
                    } else {
                        const t = i / snake.length;
                        // subtle hue shift down the body
                        fillStyle = `hsl(${120 - t * 30}, 58%, ${52 - t * 10}%)`;
                        ctx.shadowBlur = 0;
                    }

                    // draw segment circle
                    ctx.fillStyle = fillStyle;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();

                    // connector to previous segment for smooth look
                    if (i > 0) {
                        const prev = snake[i - 1];
                        const px = prev.x * CELL + CELL / 2;
                        const py = prev.y * CELL + CELL / 2;
                        const minx = Math.min(px, cx) - r;
                        const miny = Math.min(py, cy) - r;
                        const w = Math.abs(px - cx) + r * 2;
                        const h = Math.abs(py - cy) + r * 2;
                        ctx.fillStyle = fillStyle;
                        ctx.fillRect(minx, miny, w, h);
                    }

                    // reset shadow after drawing head
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';
                }

                // draw eyes on the head for personality
                if (snake.length) {
                    const head = snake[0];
                    const hx = head.x * CELL + CELL / 2;
                    const hy = head.y * CELL + CELL / 2;
                    const hr = CELL * 0.35;
                    // perpendicular to direction for eye separation
                    const perpX = -dir.y;
                    const perpY = dir.x;
                    const eyeSep = hr * 0.6;
                    const forward = hr * 0.6;

                    const eye1x = hx + dir.x * forward + perpX * eyeSep;
                    const eye1y = hy + dir.y * forward + perpY * eyeSep;
                    const eye2x = hx + dir.x * forward - perpX * eyeSep;
                    const eye2y = hy + dir.y * forward - perpY * eyeSep;

                    // white of eyes
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(eye1x, eye1y, hr * 0.22, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eye2x, eye2y, hr * 0.22, 0, Math.PI * 2); ctx.fill();

                    // pupils (slightly shifted forward)
                    const pupilShift = 0.08 * CELL;
                    ctx.fillStyle = '#111';
                    ctx.beginPath(); ctx.arc(eye1x + dir.x * pupilShift, eye1y + dir.y * pupilShift, hr * 0.11, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eye2x + dir.x * pupilShift, eye2y + dir.y * pupilShift, hr * 0.11, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') nextDir = {x:0,y:-1};
            if (k === 's') nextDir = {x:0,y:1};
            if (k === 'a') nextDir = {x:-1,y:0};
            if (k === 'd') nextDir = {x:1,y:0};
            // optional: allow arrow keys too
            if (k === 'arrowup') nextDir = {x:0,y:-1};
            if (k === 'arrowdown') nextDir = {x:0,y:1};
            if (k === 'arrowleft') nextDir = {x:-1,y:0};
            if (k === 'arrowright') nextDir = {x:1,y:0};

            if (!running && k === 'r') {
                startGame();
            }
        });

        startGame();
    </script>
</body>
</html>
