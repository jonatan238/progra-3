<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hola Mundo</title>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 2rem; text-align: center; }
        button { padding: .5rem 1rem; font-size: 1rem; }
    </style>
</head>
<body>
    <h1>¡Hola, mundo!</h1>
    <p>Página de ejemplo en HTML.</p>
    <button id="saludo">Mostrar saludo</button>

    <script>
        document.getElementById('saludo').addEventListener('click', () => {
            alert('¡Hola, mundo!');
        });
    </script>
</body>
</html>
